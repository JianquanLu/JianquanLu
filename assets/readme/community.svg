    <text x="24" y="91" fill="#66747B" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="12">FORK</text>

    <path d="M292 62H390" stroke="#65BEB9" stroke-width="2"/><path d="M380 54L390 62 380 70" fill="none" stroke="#65BEB9" stroke-width="2"/>

