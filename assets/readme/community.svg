<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430" role="img" aria-labelledby="title desc">
  <title id="title">Open-source contribution routes</title>
  <desc id="desc">Two open pull requests flow from Jianquan Lu's GREAT-PVT fork back to the Wuhan University upstream, alongside a yuni-tab fork with one independent improvement commit.</desc>
  <defs>
