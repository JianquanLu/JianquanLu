    </g>

    <path d="M912 62H956" stroke="#EF806F" stroke-width="2"/><path d="M946 54L956 62 946 70" fill="none" stroke="#EF806F" stroke-width="2"/>
    <text x="972" y="54" fill="#172027" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14" font-weight="700">GREAT-WHU</text>
