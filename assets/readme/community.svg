      <text x="18" y="27" fill="#65D7D1" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="12">PR #7 · OPEN</text>
      <text x="18" y="53" fill="#F4F7F7" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14" font-weight="600">Restore default GNSS</text>
